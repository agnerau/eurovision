<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{.Title}} - Eurovision {{.Year}} </title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

<header class="topbar">
  <h1>✨ {{.Title}} - Eurovision {{.Year}}</h1>
  <nav>
    <a href="/home">Home</a>
    <a href="/logout">Logout</a>
  </nav>
</header>

<main class="container">
  <section class="panel">
    <p>
      Drag countries into places. You don’t need to fill all.
    </p>

    <div class="prediction-layout">
      <div>
        <h2>Countries</h2>
        <div id="countries" class="country-list"></div>
      </div>

      <div>
        <h2>Your ranking</h2>
        <div id="slots" class="slots"></div>
      </div>
    </div>
    <div class="submit-area">
      <button id="submitBtn" class="submit-btn">Submit prediction</button>
      <div id="message"></div>
    </div>


  </section>
</main>

<script>
  window.EDIT_MODE = {{if .Edit}}true{{else}}false{{end}};
</script>
<script src="/static/prediction.js"></script>

</body>
</html>
